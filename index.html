<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generatore di carte Guai e Vantaggi per Cthulhu Confidential.">
    <title>Generatore Fedele Carte - Cthulhu Confidential</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Generatore Carte Cthulhu Confidential">
    <meta property="og:description" content="Crea le tue carte Guai e Vantaggi personalizzate per Cthulhu Confidential in modo semplice e veloce.">
    <meta property="og:image" content="social_share_image.png"> <!-- TODO: Sostituire con un'immagine più adatta per la condivisione social (es. logo o screenshot app) -->

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Generatore Carte Cthulhu Confidential">
    <meta name="twitter:description" content="Crea le tue carte Guai e Vantaggi personalizzate per Cthulhu Confidential.">
    <meta name="twitter:image" content="social_share_image.png"> <!-- TODO: Sostituire con un'immagine più adatta per la condivisione social (es. logo o screenshot app) -->

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <input type="text" id="titolo" placeholder="Titolo Carta (es. Ferita lieve)">
        <select id="tipo">
            <option value="Vantaggio">Vantaggio</option>
            <option value="Guai">Guai</option>
        </select>
        <select id="durata">
            <option value="">Durata</option>
            <option value="Immediata">Immediata</option>
            <option value="Fine Scena">Fine Scena</option>
            <option value="Fine Indagine">Fine Indagine</option>
            <option value="Permanente">Permanente</option>
        </select>
        <input type="text" id="destino" placeholder="Destino se non risolta...">
        <textarea id="testo" placeholder="Descrizione del Guai o Vantaggio..."></textarea>
        <button onclick="preparaGenerazione()">Genera Fedele</button>
    </div>
    
    <img id="imgFinale" alt="Carta generata apparirà qui">
</body>
<script src="script.js"></script>
</html>
